name: Daily PFT Ticket Update

# Runs every day at 4:45 AM UTC = 10:15 AM IST
on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Run daily agent
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python run_daily_agent.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add ticket_history.db
          git add internet_issues_tickets_*.xlsx 2>/dev/null || true
          git add pending_report_*.xlsx 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Auto-update: Daily ticket data $(date -u +%Y-%m-%d)"
          git push origin main

      # Wait for Vercel to deploy the updated dashboard
      - name: Wait for Vercel deployment
        run: |
          echo "Waiting 60 seconds for Vercel to deploy..."
          sleep 60

      # Take screenshot and post to Slack
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Post screenshot to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: python slack_screenshot.py

      # Notify on failure via Slack bot
      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          python -c "
          import requests, os
          from datetime import datetime
          today = datetime.now().strftime('%Y-%m-%d')
          resp = requests.post('https://slack.com/api/chat.postMessage',
            headers={'Authorization': f'Bearer {os.environ[\"SLACK_BOT_TOKEN\"]}', 'Content-Type': 'application/json'},
            json={'channel': os.environ['SLACK_CHANNEL'], 'text': f':x: *PFT Daily Update Failed — {today}*\nPlease run manually via Claude Code.'})
          print(resp.json())
          "
