name: Daily PFT Ticket Update

# Primary: 10:15 AM IST, Backup: 10:30 AM IST (in case GitHub delays the first)
# "Already updated" check prevents duplicate runs
on:
  schedule:
    - cron: '45 4 * * *'   # Primary: 10:15 AM IST
    - cron: '0 5 * * *'    # Backup: 10:30 AM IST
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-tickets:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Max 2 hours (till ~12 PM IST)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if already updated today
        id: check
        run: |
          TODAY=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          LAST_MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "")
          if echo "$LAST_MSG" | grep -q "Auto-update: Daily ticket data $TODAY"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already updated for $TODAY, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No update for $TODAY yet, proceeding."
          fi

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install openpyxl requests

      - name: Run daily agent (retry every 15 min until email found)
        if: steps.check.outputs.skip != 'true'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          MAX_ATTEMPTS=21
          WAIT_SECONDS=300
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo ""
            echo "=========================================="
            echo "Attempt $attempt of $MAX_ATTEMPTS ($(TZ=Asia/Kolkata date '+%I:%M %p IST'))"
            echo "=========================================="
            if python run_daily_agent.py; then
              echo ""
              echo "SUCCESS on attempt $attempt!"
              exit 0
            else
              echo ""
              echo "Email not found yet on attempt $attempt."
              if [ $attempt -lt $MAX_ATTEMPTS ]; then
                echo "Waiting 5 minutes before next try..."
                sleep $WAIT_SECONDS
              fi
            fi
          done
          echo ""
          echo "FAILED: Email not found after $MAX_ATTEMPTS attempts (till 12 PM IST)."
          exit 1

      - name: Commit and push updated database
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add ticket_history.db
          git add internet_issues_tickets_*.xlsx 2>/dev/null || true
          git add pending_report_*.xlsx 2>/dev/null || true
          TODAY=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          git diff --cached --quiet || git commit -m "Auto-update: Daily ticket data $TODAY"
          git push origin main

      - name: Wait for Railway deployment
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "Waiting 90 seconds for Railway to deploy..."
          sleep 90

      - name: Install Playwright
        if: steps.check.outputs.skip != 'true'
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Post screenshot to Slack
        if: steps.check.outputs.skip != 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: python slack_screenshot.py

      - name: Notify Slack on failure
        if: failure() && steps.check.outputs.skip != 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          pip install requests 2>/dev/null
          python -c "
          import requests, os
          from datetime import datetime
          today = datetime.now().strftime('%Y-%m-%d')
          resp = requests.post('https://slack.com/api/chat.postMessage',
            headers={'Authorization': f'Bearer {os.environ[\"SLACK_BOT_TOKEN\"]}', 'Content-Type': 'application/json'},
            json={'channel': os.environ['SLACK_CHANNEL'], 'text': f':x: *PFT Daily Update Failed — {today}*\nEmail not found after retrying till 12 PM IST.\nPlease run manually via Claude Code.'})
          print(resp.json())
          "
